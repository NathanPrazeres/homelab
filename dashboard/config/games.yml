- name: Games
  columns:
    - size: small
      widgets:
        - type: group
          widgets:
            - $include: widgets/epicgames.yml
            - type: rss
              title: Giveaways
              preserve-order: true
              single-line-titles: true
              cache: 1h
              collapse-after: 7
              feeds:
                - url: "https://isthereanydeal.com/feeds/PT/giveaways.rss"


    - size: full
      widgets:
        - type: group
          widgets:
            - $include: widgets/steam-specials.yml

            - type: rss
              title: Active Bundles
              cache: 1h
              collapse-after: 7
              feeds:
                - url: "https://isthereanydeal.com/feeds/PT/EUR/bundles.rss"

    - size: small
      widgets:
        - type: twitch-channels
          collapse-after: 6
          channels:
            - brawlhalla
            - worldoftanks
            - quickybaby
            - skill4ltu
            - joltzdude139
            - ki11ersix
            - pavelskibh
