- name: Home
  # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
  # hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: calendar
          first-day-of-week: monday

        - type: weather
          location: Intendente, Portugal
          units: metric
          hour-format: 24h
          show-area-name: true

    - size: full
      widgets:
        - type: search
          search-engine: google
          autofocus: true
          bangs:
            - title: YouTube
              shortcut: yt
              url: https://www.youtube.com/results?search_query={QUERY}
            - title: Genius
              shortcut: g
              url: https://genius.com/search?q={QUERY}
            - title: Perplexity
              shortcut: ai
              url: https://www.perplexity.ai/search?q={QUERY}

        - type: group
          widgets:
            # TODO: turn this into split column for proper mobile formatting
            - type: bookmarks
              groups:
                - title: "Quick Access"
                  hide-arrow: true
                  same-tab: true
                  color: 100 50 50
                  links:
                    - title: Técnico
                      url: https://id.tecnico.ulisboa.pt/cas/login/
                      icon: ./assets/icons/ist.png
                    - title: GitHub
                      url: https://www.github.com/
                      icon: auto-invert di:github
                    - title: Wikipedia
                      url: https://en.wikipedia.org/
                      icon: di:wikipedia
                # - title: "Google"
                #   hide-arrow: true
                #   same-tab: true
                #   color: 50 40 50
                #   links:
                    - title: YouTube
                      url: https://www.youtube.com/
                      icon: di:youtube
                    - title: Gmail
                      url: https://mail.google.com/mail/u/0/
                      icon: di:gmail
                - title: "Home Lab"
                  hide-arrow: true
                  same-tab: true
                  color: 200 50 50
                  links:
                    - title: Immich
                      url: https://photos.${DOMAIN:-example.com}/
                      icon: di:immich
                    - title: Jellyfin
                      url: https://media.${DOMAIN:-example.com}/
                      icon: di:jellyfin
                    - title: Seerr
                      url: https://seerr.${DOMAIN:-example.com}/
                      icon: di:seerr
                    - title: Radarr
                      url: https://radarr.${DOMAIN:-example.com}/
                      icon: di:radarr
                    - title: Sonarr
                      url: https://sonarr.${DOMAIN:-example.com}/
                      icon: di:sonarr
                - title: "Tools & Utils"
                  hide-arrow: true
                  same-tab: true
                  color: 10 70 70
                  links:
                    - title: Gemini
                      url: https://gemini.google.com/
                      icon: di:google-gemini
                    - title: CyberChef
                      url: https://gchq.github.io/CyberChef/
                      icon: di:cyberchef
                    - title: Champagne Piracy
                      url: https://champagne.pages.dev/
                      icon: auto-invert di:github
                    - title: SteamDB
                      url: https://steamdb.info
                      icon: si:steamdb
                - title: "" # NOTE: continuation of Home Lab
                  hide-arrow: true
                  same-tab: true
                  links:
                    - title: Lidarr
                      url: https://lidarr.${DOMAIN:-example.com}/
                      icon: di:lidarr
                    - title: Nextcloud
                      url: https://cloud.${DOMAIN:-example.com}/
                      icon: di:nextcloud
                    - title: Pi-Hole
                      url: https://pihole.${DOMAIN:-example.com}/
                      icon: di:pi-hole
                    - title: qBittorrent
                      url: https://qbit.${DOMAIN:-example.com}/
                      icon: di:qbittorrent
                    - title: Vaultwarden
                      url: https://vault.${DOMAIN:-example.com}/
                      icon: di:vaultwarden-light

            - $include: widgets/nextcloud-deck.yml

            - type: videos
