- name: Server
  columns:
    - size: small
      widgets:
        - type: server-stats
          servers:
            - type: local
              name: Services
              hide-mountpoints-by-default: true
              mountpoints:
                "/":
                  name: Root
                  hide: false
                "/data":
                  name: Data
                  hide: false
        - type: dns-stats
          service: pihole-v6
          url: https://pihole.${DOMAIN}/
          password: ${PIHOLE_PASSWORD}
          hour-format: 24h
        - type: monitor
          cache: 1m
          title: ""
          sites:
            - title: Pi-Hole
              url: https://pihole.${DOMAIN}/
              icon: di:pi-hole
              allow-insecure: true

    - size: full
      widgets:
        - type: group
          widgets:
            - type: docker-containers
              title: "Docker Containers"
              cache: 1m       # optional, how often to cache data
              all: true       # whether to show stopped containers, etc
              hide: false     # hide disabled
              # optionally order, filters, etc

            - $include: widgets/immich.yml
            - $include: widgets/qbit.yml

    - size: small
      widgets:
        - $include: widgets/cup.yml

        - type: releases
          show-source-icon: true
          cache: 1h
          # Without authentication the Github API allows for up to 60 requests per hour. You can create a
          # read-only token from your Github account settings and use it here to increase the limit.
          # token: ...
          repositories:
            - docker/compose
            - pi-hole/pi-hole
            - pivpn/pivpn
            - fail2ban/fail2ban
            - dockerhub:caddy:alpine
            - dockerhub:caddy:builder-alpine
