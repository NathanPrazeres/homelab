services:
  glance:
    container_name: glance
    image: glanceapp/glance
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./assets:/app/assets
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/data:/data:ro
    networks:
      - glance
      - rev_proxy
    env_file: ".env"
    extra_hosts:
      - "pihole.nvsp.dev:$PIHOLE_HOST"  # Fix the monitor widget for Pi-Hole
    labels:
      glance.name: Glance
      glance.icon: sh:glance
      glance.url: https://dash.nvsp.dev/
      glance.description: Dashboard
      glance.id: glance

  cup:
    image: ghcr.io/sergi0g/cup:latest
    container_name: cup
    command: ["serve", "-p", "9000"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - glance
    labels:
      glance.name: Cup
      glance.parent: glance
      # glance.icon: sh:cup-updates
      # glance.url: http://cup:9000/
      # glance.description: Docker Image Update Checker
      # glance.id: cup

networks:
  rev_proxy:
    external: true
  glance:
    ipam:
      config:
        - subnet: 172.22.0.0/16
